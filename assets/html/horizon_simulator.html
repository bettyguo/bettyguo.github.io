<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Protected</title>
<style>
  :root { color-scheme: light dark; }
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #FAFAF7; color: #1A1A2E;
  }
  @media (prefers-color-scheme: dark) {
    html, body { background: #13131C; color: #F0EFEA; }
    .card { background: #1C1C28 !important; border-color: #2E2E3E !important; }
    input { background: #13131C !important; color: #F0EFEA !important; border-color: #2E2E3E !important; }
  }
  .card {
    padding: 2rem 2.2rem;
    border: 1px solid #E5E3D8;
    border-radius: 10px;
    background: #F4F3EC;
    max-width: 360px;
    width: 90%;
    text-align: center;
  }
  h1 { font-size: 1.1rem; margin: 0 0 0.3rem 0; color: #2E3A7F; }
  p { margin: 0 0 1rem 0; font-size: 0.88rem; opacity: 0.75; }
  form { display: flex; flex-direction: column; gap: 0.6rem; }
  input[type="password"] {
    padding: 0.6rem 0.8rem;
    border: 1px solid #E5E3D8;
    border-radius: 6px;
    font-size: 1rem;
    background: white;
    color: #1A1A2E;
    text-align: center;
    letter-spacing: 0.1em;
  }
  button {
    padding: 0.6rem 1rem;
    border: none;
    border-radius: 6px;
    background: #2E3A7F;
    color: white;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .err { color: #B91C1C; font-size: 0.82rem; margin-top: 0.4rem; min-height: 1.2em; }
</style>
</head>
<body>
<div class="card">
  <h1>Protected page</h1>
  <p>Enter the password to view.</p>
  <form id="f">
    <input id="pw" type="password" autocomplete="current-password" autofocus required>
    <button id="b" type="submit">Unlock</button>
    <div class="err" id="e"></div>
  </form>
</div>

  const ITER = 250000;
  const SALT_LEN = 16;
  const IV_LEN = 12;

  function b64ToBuf(b64){
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) buf[i] = bin.charCodeAt(i);
    return buf;
  }

  async function tryUnlock(pw){
    const payload = b64ToBuf(PAYLOAD_B64);
    const salt = payload.slice(0, SALT_LEN);
    const iv   = payload.slice(SALT_LEN, SALT_LEN + IV_LEN);
    const ct   = payload.slice(SALT_LEN + IV_LEN);
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      'raw', enc.encode(pw), {name:'PBKDF2'}, false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt: salt, iterations: ITER, hash:'SHA-256'},
      baseKey,
      {name:'AES-GCM', length:256},
      false,
      ['decrypt']
    );
    const ptBuf = await crypto.subtle.decrypt(
      {name:'AES-GCM', iv: iv},
      key,
      ct
    );
    return new TextDecoder().decode(ptBuf);
  }

  const form = document.getElementById('f');
  const err  = document.getElementById('e');
  const btn  = document.getElementById('b');
  const pw   = document.getElementById('pw');

  form.addEventListener('submit', async function(ev){
    ev.preventDefault();
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Unlocking...';
    try {
      const html = await tryUnlock(pw.value);
      // Replace the whole document with the decrypted HTML
      document.open();
      document.write(html);
      document.close();
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Unlock';
      err.textContent = 'Wrong password.';
      pw.select();
    }
  });
})();
